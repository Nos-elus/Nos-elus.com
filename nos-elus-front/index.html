    <noscript>
      <h1>nos-elus.com — Tous les élus de France</h1>
      <p>nos-elus.com (aussi appelé nos-elus, noselus ou nos élus) est une plateforme citoyenne et open source qui agrège des données publiques sur les ~50 000 élus de la République française : députés, sénateurs, maires, ministres, eurodéputés, conseillers régionaux et départementaux, membres du Conseil constitutionnel.</p>
      <p>Pour chaque élu, vous pouvez consulter : affaires judiciaires (mis en examen, condamné, relaxé, classé), votes parlementaires, patrimoine déclaré à la HATVP, cumul des mandats, indemnités touchées, coût total de la carrière politique. Tous les éléments sont sourcés depuis des sources publiques officielles.</p>
      <p>Sources : Répertoire National des Élus (data.gouv.fr), data.assemblee-nationale.fr, data.senat.fr, NosDéputés.fr, HATVP, JUDILIBRE, Wikidata, Parlement européen.</p>
      <p>Activez JavaScript pour utiliser le site interactivement, ou consultez le <a href="https://github.com/Nos-elus/Nos-elus.com">code source sur GitHub</a>.</p>
    </noscript>
